<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJazz Groovebox</title>
    <style>
        :root {
            --bg: #121212; --panel: #1e1e1e; --accent: #ff5252;
            --text: #e0e0e0; --grid-off: #333; --grid-on: #ff5252;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: var(--panel); padding: 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 1000px; width: 100%;
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        .controls {
            display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;
            background: #2a2a2a; padding: 15px; border-radius: 8px;
        }
        button {
            background: var(--accent); color: white; border: none;
            padding: 10px 20px; font-weight: bold; border-radius: 4px;
            cursor: pointer; text-transform: uppercase;
        }
        button:hover { background: #ff7676; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
        .grid-container { margin-bottom: 20px; }
        .grid-title { font-size: 0.9rem; margin-bottom: 5px; color: #aaa; }
        .grid {
            display: grid; grid-template-columns: repeat(64, 1fr); gap: 2px;
            background: #000; padding: 4px; border-radius: 4px; overflow-x: auto;
        }
        .step {
            width: 12px; height: 24px; background: var(--grid-off);
            border-radius: 2px; cursor: pointer; transition: 0.1s;
        }
        .step.active { background: var(--grid-on); box-shadow: 0 0 8px var(--grid-on); }
        .step.playing { border: 2px solid white; transform: scale(1.1); }
        /* Bar markers (every 16 steps = 1 bar) */
        .step:nth-child(16n + 1) { margin-left: 6px; } 
    </style>
</head>
<body>

<div class="container">
    <h1>MicroJazz Groovebox</h1>
    
    <div class="controls">
        <button id="playBtn">Play / Pause</button>
        <div class="slider-group">
            <label>BPM: <span id="bpmVal">120</span></label>
            <input type="range" id="bpm" min="60" max="200" value="120">
        </div>
        <div class="slider-group">
            <label>Microtonal Drift (Cents): <span id="microVal">0</span></label>
            <input type="range" id="microtonal" min="-50" max="50" value="0">
        </div>
        <div class="slider-group">
            <label>Psychoacoustic Depth: <span id="psychoVal">50</span>%</label>
            <input type="range" id="psycho" min="0" max="100" value="50">
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-title">Riddim (Bass) Trigger - 64 Steps (4 Bars)</div>
        <div class="grid" id="riddimGrid"></div>
    </div>

    <div class="grid-container">
        <div class="grid-title">Complex Arpeggio Trigger - 64 Steps</div>
        <div class="grid" id="arpGrid"></div>
    </div>
</div>

<script>
    // --- UI Setup ---
    const riddimGrid = document.getElementById('riddimGrid');
    const arpGrid = document.getElementById('arpGrid');
    const steps = 64;
    const riddimPattern = new Array(steps).fill(false);
    const arpPattern = new Array(steps).fill(false);
    
    // Default patterns for demo
    for(let i=0; i<steps; i+=4) riddimPattern[i] = true; // 4-on-the-floor bass
    for(let i=0; i<steps; i+=3) arpPattern[i] = true; // Polyrhythmic arp

    function createGrid(container, patternArray) {
        for (let i = 0; i < steps; i++) {
            const div = document.createElement('div');
            div.className = 'step' + (patternArray[i] ? ' active' : '');
            div.addEventListener('click', () => {
                patternArray[i] = !patternArray[i];
                div.classList.toggle('active');
            });
            container.appendChild(div);
        }
    }
    createGrid(riddimGrid, riddimPattern);
    createGrid(arpGrid, arpPattern);

    // --- Audio Engine ---
    let audioCtx;
    let isPlaying = false;
    let currentStep = 0;
    let nextNoteTime = 0.0;
    let lookahead = 25.0; // ms
    let scheduleAheadTime = 0.1; // s
    let timerID;

    // Parameters
    let bpm = 120;
    let microDrift = 0; // In cents
    let psychoDepth = 0.5;
    
    // Nodes
    let masterGain, delayL, delayR, waveshaper;

    document.getElementById('bpm').addEventListener('input', (e) => { bpm = e.target.value; document.getElementById('bpmVal').innerText = bpm; });
    document.getElementById('microtonal').addEventListener('input', (e) => { microDrift = e.target.value; document.getElementById('microVal').innerText = microDrift; });
    document.getElementById('psycho').addEventListener('input', (e) => { psychoDepth = e.target.value / 100; document.getElementById('psychoVal').innerText = e.target.value; updatePsychoacoustic(); });

    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.6;
        
        // Psychoacoustic Module (Haas Effect + Saturation)
        // Splits the signal, delays one side slightly, and applies non-linear distortion
        waveshaper = audioCtx.createWaveShaper();
        waveshaper.curve = makeDistortionCurve(400); 
        waveshaper.oversample = '4x';
        
        const splitter = audioCtx.createChannelSplitter(2);
        const merger = audioCtx.createChannelMerger(2);
        
        delayL = audioCtx.createDelay();
        delayR = audioCtx.createDelay();
        
        masterGain.connect(waveshaper);
        waveshaper.connect(splitter);
        
        splitter.connect(delayL, 0);
        splitter.connect(delayR, 1);
        
        delayL.connect(merger, 0, 0);
        delayR.connect(merger, 0, 1);
        
        merger.connect(audioCtx.destination);
        updatePsychoacoustic();
    }

    function makeDistortionCurve(amount) {
        let k = typeof amount === 'number' ? amount : 50;
        let n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180, x;
        for (let i = 0; i < n_samples; ++i) {
            x = i * 2 / n_samples - 1;
            curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
        }
        return curve;
    }

    function updatePsychoacoustic() {
        if(!audioCtx) return;
        // Haas widening: Right ear delayed by 10-25ms based on depth
        delayR.delayTime.value = (0.010 + (psychoDepth * 0.015)); 
        delayL.delayTime.value = 0; 
        // Dry/Wet saturation blend could be added here
    }

    // --- Music Theory Engine ---
    
    // Convert MIDI note to frequency with Microtonal Cents drift
    function mtof(midi, cents = 0) {
        return 440 * Math.pow(2, (midi + (cents/100) - 69) / 12);
    }

    // Base: C7#11 (Tritone Consonance) - Root, Maj3, Tritone (Dim5), Min7
    const chordBase = [48, 52, 54, 58]; 
    
    // Bridge: Eb Minor Pentatonic (Tense Bridge) - Root, Min3, 4, 5, Min7
    const chordBridge = [51, 54, 56, 58, 61]; 
    
    let arpIndex = 0;

    function getCurrentChord(barIndex) {
        // Bars 1 & 2: Base. Bars 3 & 4: Bridge
        return (barIndex < 2) ? chordBase : chordBridge;
    }

    // --- Synthesizers ---
    
    function playBass(time, step) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        let bar = Math.floor(step / 16);
        let chord = getCurrentChord(bar);
        let root = chord[0] - 12; // Drop an octave
        
        osc.type = 'sawtooth';
        osc.frequency.value = mtof(root, microDrift); // Apply microtonal drift
        
        // Funky envelope
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.8, time + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
        
        // Simple lowpass filter for the bass
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, time);
        filter.frequency.exponentialRampToValueAtTime(100, time + 0.3);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(masterGain);
        
        osc.start(time);
        osc.stop(time + 0.4);
    }

    function playArp(time, step) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        let bar = Math.floor(step / 16);
        let chord = getCurrentChord(bar);
        
        // Complex algorithmic selection: traverse chord upwards, jump octaves based on step
        let note = chord[arpIndex % chord.length];
        let octaveOffset = (step % 3 === 0) ? 12 : 24; 
        
        osc.type = 'sine';
        osc.frequency.value = mtof(note + octaveOffset, 0); // Keep arp strictly tuned for contrast
        
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.3, time + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
        
        osc.connect(gain);
        gain.connect(masterGain);
        
        osc.start(time);
        osc.stop(time + 0.2);
        
        arpIndex++;
    }

    // --- Sequencer Logic ---
    
    function nextNote() {
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += 0.25 * secondsPerBeat; // 16th notes
        currentStep++;
        if (currentStep === steps) currentStep = 0;
    }

    function scheduleNote(stepNumber, time) {
        // UI Updates (queued via requestAnimationFrame for performance)
        requestAnimationFrame(() => {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('playing'));
            if(riddimGrid.children[stepNumber]) riddimGrid.children[stepNumber].classList.add('playing');
            if(arpGrid.children[stepNumber]) arpGrid.children[stepNumber].classList.add('playing');
        });

        if (riddimPattern[stepNumber]) {
            playBass(time, stepNumber);
        }
        if (arpPattern[stepNumber]) {
            playArp(time, stepNumber);
        } else {
            // Reset arp index slightly on pauses to make it feel more "algorithmic" and less static
            if(Math.random() > 0.8) arpIndex--; 
        }
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(currentStep, nextNoteTime);
            nextNote();
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    document.getElementById('playBtn').addEventListener('click', () => {
        initAudio();
        isPlaying = !isPlaying;
        if (isPlaying) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentStep = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
            scheduler();
        } else {
            clearTimeout(timerID);
        }
    });
</script>
</body>
</html>
